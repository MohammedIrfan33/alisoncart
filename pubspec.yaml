name: alisoncart
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  http: ^1.6.0
  get: ^4.7.3
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0




flutter:


  uses-material-design: true

  
  assets:
    - assets/
    -  assets/images/
    -  assets/fonts/


  fonts:
    - family: Lufga
      fonts:
        - asset: assets/fonts/LufgaRegular.ttf
        - asset: assets/fonts/LufgaBold.ttf
          weight: 700
        - asset: assets/fonts/LufgaMedium.ttf
          weight: 500
        - asset: assets/fonts/LufgaSemiBold.ttf
          weight: 600
  
